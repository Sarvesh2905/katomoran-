<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Katomaran — URL Shortener & Link Analytics SaaS</title>
    <meta name="description" content="Katomaran is a premium URL shortener with deep link analytics. Track clicks, devices, countries, referrers, and more with beautiful real-time dashboards." />
    <meta property="og:title" content="Katomaran — URL Shortener & Link Analytics" />
    <meta property="og:description" content="Shorten links, generate QR codes, and track every click with premium analytics." />

    <!-- Prevent FOUC — apply theme before React hydration -->

      (function() {
        const t = localStorage.getItem('katomaran-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>

  </head>

  </body>
</html>
